<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Precise Automator</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body class="login-page">
    <main class="login-shell">
      <div class="login-brand">
        <span class="login-brand-mark">PA</span>
        <span>Precise Automator</span>
      </div>
      <section class="login-panel">
        <h1>Welcome back</h1>
        <p class="muted">Sign in to create and update Smartlead campaigns.</p>
        {% if error %}
        <div class="notice error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login" class="form-panel">
          <input type="hidden" name="next" value="{{ next }}">
          <label>Username
            <input name="username" autocomplete="username" required autofocus>
          </label>
          <label>Password
            <input name="password" type="password" autocomplete="current-password" required>
          </label>
          <button type="submit">Sign in</button>
        </form>
      </section>
      <p class="login-footnote">Internal tool. Access is provisioned by your team.</p>
    </main>
  </body>
</html>
