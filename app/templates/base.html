<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Precise Automator{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css?v={{ asset_version | default('') }}">
    <meta name="csrf-token" content="{{ request.cookies.get('precise_automator_session', '') }}">
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="/app">
          <span class="brand-mark" aria-hidden="true">P</span>
          <span class="brand-word">Precise Automator</span>
        </a>
        <nav class="nav-links">
          <a href="/app"{% if request.url.path == '/app' %} class="active"{% endif %}>Dashboard</a>
          <a href="/campaigns/new"{% if request.url.path.startswith('/campaigns/new') %} class="active"{% endif %}>New Campaign</a>
          <span class="nav-divider" aria-hidden="true"></span>
          <form method="post" action="/logout" class="logout-form">
            <input type="hidden" name="csrf_token" value="{{ request.cookies.get('precise_automator_session', '') }}">
            <button type="submit">Sign out</button>
          </form>
        </nav>
      </div>
    </header>
    <main class="shell">
      {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
    <script>
      document.addEventListener("submit", (event) => {
        const form = event.target;
        if (form instanceof HTMLFormElement && form.method.toLowerCase() === "post" && !form.querySelector("input[name=csrf_token]")) {
          const token = document.querySelector("meta[name=csrf-token]")?.getAttribute("content") || "";
          if (token) {
            const input = document.createElement("input");
            input.type = "hidden";
            input.name = "csrf_token";
            input.value = token;
            form.appendChild(input);
          }
        }
        if (!(form instanceof HTMLFormElement) || !form.classList.contains("js-single-submit")) return;
        if (event.defaultPrevented) return;
        const button = form.querySelector("button[type=submit], button:not([type])");
        if (!button) return;
        button.disabled = true;
        if (button.classList.contains("icon-button")) return;
        button.dataset.originalText = button.textContent;
        button.textContent = "Working...";
      });
    </script>
  </body>
</html>
