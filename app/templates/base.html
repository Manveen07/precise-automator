<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Precise Automator{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="/app">Precise Automator</a>
        <nav class="nav-links">
          <a href="/app">Dashboard</a>
          <a href="/campaigns/new">New Campaign</a>
          <form method="post" action="/logout" class="logout-form">
            <button type="submit">Logout</button>
          </form>
        </nav>
      </div>
    </header>
    <main class="shell">
      {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
    <script>
      document.addEventListener("submit", (event) => {
        const form = event.target;
        if (!(form instanceof HTMLFormElement) || !form.classList.contains("js-single-submit")) return;
        const button = form.querySelector("button[type=submit], button:not([type])");
        if (!button) return;
        button.disabled = true;
        button.dataset.originalText = button.textContent;
        button.textContent = "Working...";
      });
    </script>
  </body>
</html>
